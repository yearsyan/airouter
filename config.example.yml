server:
  listen_addr: 0.0.0.0
  port: 443
  log_dir: logs          # directory for requests.csv (default: config file directory)

upstream:
  base_url: https://open.bigmodel.cn/api/anthropic
  model: glm-4-plus            # default model sent to upstream (replaces client model)
  api_key: "replace-with-your-api-key"
  anthropic_version: "2023-06-01"

tls:
  enabled: true
  cert_dir: certs
  cert_file: cert.pem
  key_file: key.pem

# Model routing rules
# routes:
#   - input_model: claude-sonnet-4-20250514
