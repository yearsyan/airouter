server:
  listen_addr: 0.0.0.0
  port: 443
  log_dir: logs          # directory for requests.csv (default: config file directory)
  anthropic_version: "2023-06-01"

providers:
  - name: zhipu
    upstream_url: https://open.bigmodel.cn/api/anthropic
    api_key: "replace-with-your-api-key"
    auth_header: authorization    # "authorization" (default, sends Bearer) or "x-api-key"
    models:
      - glm-4-plus
      - glm-4-flash

default_model:
  provider: zhipu
  model: glm-4-plus

tls:
  enabled: true
  cert_dir: certs
  cert_file: cert.pem
  key_file: key.pem

# Model routing rules
# routes:
